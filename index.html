<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CLAN HACKERS HUB</title>
    <style>
        body { background-color: #050505; color: #39ff14; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .glitch { font-size: 45px; font-weight: bold; text-shadow: 0 0 10px #39ff14; margin-bottom: 20px; }
        
        /* Главная рамка */
        .main-box { border: 2px solid #39ff14; padding: 30px; border-radius: 15px; background: rgba(0, 255, 0, 0.05); box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); text-align: center; width: 90%; max-width: 700px; }
        
        /* Кнопки инструментов */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .tool-btn { border: 1px solid #39ff14; padding: 15px; text-decoration: none; color: #39ff14; font-size: 14px; transition: 0.3s; }
        .tool-btn:hover { background: #39ff14; color: #000; box-shadow: 0 0 15px #39ff14; transform: translateY(-3px); }

        /* Секретный раздел */
        .secret-input { margin-top: 30px; background: none; border: none; border-bottom: 1px solid #39ff14; color: #39ff14; outline: none; text-align: center; font-family: inherit; }
    </style>
</head>
<body>

    <div class="glitch">> CLAN_HACKERS <</div>

    <div class="main-box">
        <p>МЫ ТЕ, КТО СТРОИТ БУДУЩЕЕ.</p>
        <p style="color: #fff;">[ СИСТЕМА: <span id="status">ONLINE</span> ]</p>
        
        <div class="grid">
            <a href="https://www.virustotal.com" target="_blank" class="tool-btn">АНТИВИРУС (ONLINE)</a>
            <a href="https://haveibeenpwned.com" target="_blank" class="tool-btn">УТЕЧКИ ПАРОЛЕЙ</a>
            <a href="https://code.org" target="_blank" class="tool-btn">УРОКИ КОДИНГА</a>
            <a href="https://github.com" target="_blank" class="tool-btn">БАЗА ЗНАНИЙ</a>
        </div>

        <br>
        <input type="password" class="secret-input" placeholder="Введите пароль клана..." onchange="checkPass(this.value)">
    </div>

    <script>
        function checkPass(val) {
            if(val === "1337") {
                alert("ДОСТУП РАЗРЕШЕН: Наша цель — стать лучшими белыми хакерами!");
            } else {
                alert("ДОСТУП ЗАПРЕЩЕН!");
            }
        }
    </script>

</body>
</html>
