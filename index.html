<!DOCTYPE html>

        p { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="glitch">> CLAN_HACKERS <</div>
    <div class="info">
        <p>МЫ ТЕ, КТО СТРОИТ БУДУЩЕЕ.</p>

    </div>
</body>
</html>
